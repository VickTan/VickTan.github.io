<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" type="text/css" href="./style.css" />
  <title>Frontend Mentor | Blog preview card</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    /* 
    .attribution a { color: hsl(228, 45%, 44%); } */
  </style>
</head>
<body>
  <div class="base-container">
    <div class="attribution">
      <img class="blogImage" src="./assets/images/illustration-article.svg" alt="this is a blog image">
      <div class="blogDescription">
        <div class="tag">
            <p class="tag-name">Learning</p>
        </div>
        <p class="publish-date">Published 21 Dec 2023</p>
        <p class="title">HTML & CSS foundations</p>
        <p class="description">These languages are the backbone of every website, defining structure, content, and presentation.</p>
      </div>
      <div class="author">
        <img class="profile-photo" src="./assets//images/image-avatar.webp" alt="author profile photo" />
        <p class="authorName">Greg Hooper</p>
      </div>
    </div>
    
  </div>
  
  <!-- Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>. -->
</body>
</html>
